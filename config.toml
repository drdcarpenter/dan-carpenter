baseURL = "/"
languageCode = "en"
DefaultContentLanguage = "en"
title = "Website of Dan Carpenter"
theme = "anatole"
summarylength = 10
enableEmoji = true
ignoreFiles = ["\\.Rmd$", "\\.Rmarkdown$", "_files$", "_cache$"]

# Enable Disqus
#disqusShortname = ""

[permalinks]
    post = "/:year/:month/:day/:slug/"

[params]
title = "Hello, I'm Dan Carpenter"
author = "Dan Carpenter"
description = "Executive Coach for Environmental & Impact Leaders | Associate Director – Digital Innovation | Embedding Strategy, Culture & Transformation"
profilePicture = "images/profile.jpg"
keywords = "coaching, ecology, R, QGIS"
favicon = "favicons/"
customCss = []
mainSections = ["post"]
dateFormat = "2020-06-28"

## Math settings
[params.math]
enable = false  # options: true, false. Enable math support globally, default: false. You can always enable math on per page.
use = "katex"  # options: "katex", "mathjax". default is "katex".

